name: Diagnostic pytest

on:
  push:
    branches:
      - fix/p0-experience-integrity
  workflow_dispatch:

jobs:
  pytest-diagnostic:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - name: Install dependencies
        run: |
          python -m pip install --disable-pip-version-check --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt --disable-pip-version-check
      - name: Capture pytest output
        id: pytest
        continue-on-error: true
        run: |
          set +e
          pytest -vv --tb=short > pytest-output.txt 2>&1
          code=$?
          echo "$code" > pytest-exit-code.txt
          exit "$code"
      - name: Upload pytest diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-diagnostic
          path: |
            pytest-output.txt
            pytest-exit-code.txt
          if-no-files-found: error
      - name: Fail when pytest failed
        if: steps.pytest.outcome == 'failure'
        run: exit 1
