name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        timeout-minutes: 8
        run: |
          python -m pip install --disable-pip-version-check --timeout 30 --retries 5 --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt --disable-pip-version-check --timeout 30 --retries 5

      - name: Run pytest
        id: pytest
        continue-on-error: true
        run: pytest -q --tb=short > pytest.log 2>&1

      - name: Upload pytest diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-log
          path: pytest.log
          if-no-files-found: error
          retention-days: 7

      - name: Run RAG K1 local quality baseline
        id: rag_quality
        continue-on-error: true
        run: |
          python tools/run_rag_quality_baseline.py \
            --output rag-quality-baseline.json \
            > rag-quality-baseline.log 2>&1

      - name: Upload RAG K1 quality baseline
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rag-quality-baseline
          path: |
            rag-quality-baseline.json
            rag-quality-baseline.log
          if-no-files-found: warn
          retention-days: 7

      - name: Enforce RAG quality harness integrity
        if: steps.rag_quality.outcome == 'failure'
        run: |
          tail -200 rag-quality-baseline.log
          exit 1

      - name: Enforce pytest result
        if: steps.pytest.outcome == 'failure'
        run: |
          tail -200 pytest.log
          exit 1

      - name: Run ruff
        run: ruff check .

      - name: Run package helper (validate packaging logic)
        run: python tools/package_project_helper.py . /dev/null 0

      - name: Run detect-secrets
        id: secrets
        continue-on-error: true
        run: |
          pip install detect-secrets 2>/dev/null
          detect-secrets scan --disable-plugin KeywordDetector \
            --exclude-files '.*\.(pyc|jpg|png|zip)$' \
            --exclude-lines '(base_sha|head_sha|commit_sha|file_sha|tree_sha|ref|source_artifact_head)[^A-Za-z0-9]+[0-9a-f]{40}|fingerprint_sha256[^A-Za-z0-9]+[0-9a-f]{64}|id[^A-Za-z0-9]+MDIzOlB1bGxSZXF1ZXN0UmV2aWV3VGhyZWFk[A-Za-z0-9+/=]+' \
            .github README.md docs src tests tools config templates roles changelog assets frontend .env.example \
            > detect-secrets-report.json 2>&1
          python - <<'PY'
          import json
          import sys

          with open("detect-secrets-report.json", encoding="utf-8") as f:
              report = json.load(f)

          findings = {
              filename: secrets
              for filename, secrets in report.get("results", {}).items()
              if secrets
          }
          if findings:
              print("ERROR: potential secrets detected — this is a public repository")
              print("If these are false positives, add an inline allowlist comment or update the scan exclusions.")
              json.dump(findings, sys.stdout, indent=2, sort_keys=True)
              print()
              sys.exit(1)
          PY
          echo "detect-secrets: no secrets found"

      - name: Upload detect-secrets diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detect-secrets-report
          path: detect-secrets-report.json
          if-no-files-found: error
          retention-days: 7

      - name: Enforce detect-secrets result
        if: steps.secrets.outcome == 'failure'
        run: |
          cat detect-secrets-report.json
          exit 1

      - name: Run expanded mypy
        id: mypy
        continue-on-error: true
        run: timeout 120s mypy --explicit-package-bases src/ > mypy.log 2>&1

      - name: Upload mypy diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mypy-log
          path: mypy.log
          if-no-files-found: error
          retention-days: 7

      - name: Enforce mypy baseline
        env:
          MYPY_OUTCOME: ${{ steps.mypy.outcome }}
        run: |
          python tools/check_mypy_baseline.py \
            --log mypy.log \
            --baseline config/mypy_baseline.json \
            --outcome "$MYPY_OUTCOME"

      - name: Test and build frontend
        id: frontend
        continue-on-error: true
        working-directory: frontend
        run: |
          set -o pipefail
          {
            npm ci
            npm test
            npm run build
          } > ../frontend.log 2>&1

      - name: Upload frontend diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-log
          path: frontend.log
          if-no-files-found: error
          retention-days: 7

      - name: Enforce frontend result
        if: steps.frontend.outcome == 'failure'
        run: |
          tail -240 frontend.log
          exit 1
