name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run pytest
        run: pytest

      - name: Run ruff
        run: ruff check .

      - name: Run package helper (validate packaging logic)
        run: python tools/package_project_helper.py . /dev/null 0

      - name: Run detect-secrets
        run: |
          pip install detect-secrets 2>/dev/null
          detect-secrets scan --disable-plugin KeywordDetector \
            --exclude-files '.*\.(pyc|jpg|png|zip)$' \
            .github README.md docs src tests tools config templates roles changelog assets \
            > .secrets.out 2>&1
          python - <<'PY'
          import json
          import sys

          with open(".secrets.out", encoding="utf-8") as f:
              report = json.load(f)

          findings = {
              filename: secrets
              for filename, secrets in report.get("results", {}).items()
              if secrets
          }
          if findings:
              print("ERROR: potential secrets detected — this is a public repository")
              print("If these are false positives, add an inline allowlist comment or update the scan exclusions.")
              json.dump(findings, sys.stdout, indent=2, sort_keys=True)
              print()
              sys.exit(1)
          PY
          echo "detect-secrets: no secrets found"

      - name: Run expanded mypy
        continue-on-error: true
        run: timeout 120s mypy --explicit-package-bases src/
