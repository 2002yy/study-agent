name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run pytest
        run: pytest

      - name: Run ruff
        run: ruff check .

      - name: Run targeted mypy
        continue-on-error: true
        run: timeout 120s mypy --explicit-package-bases src/llm_client.py src/memory.py src/context_builder.py
