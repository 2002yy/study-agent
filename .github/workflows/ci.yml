name: Diagnose research reliability pytest

on:
  pull_request:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/p0-research-reliability

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --disable-pip-version-check --timeout 30 --retries 5 --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt --disable-pip-version-check --timeout 30 --retries 5

      - name: Run pytest and capture output
        id: pytest
        continue-on-error: true
        run: pytest -vv > pytest-output.txt 2>&1

      - name: Upload pytest diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: research-reliability-pytest
          path: pytest-output.txt
          if-no-files-found: error

      - name: Preserve failure status
        if: steps.pytest.outcome == 'failure'
        run: exit 1
