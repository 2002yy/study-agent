name: Finalize and validate recoverable research runs

on:
  pull_request:

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/p0-research-run
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Apply schema and frontend integration patch
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text(encoding="utf-8")
              if old not in text:
                  raise SystemExit(f"anchor not found in {path}: {old[:140]!r}")
              file.write_text(text.replace(old, new, 1), encoding="utf-8")

          database = "src/infrastructure/sqlite/database.py"
          replace_once(database, "SCHEMA_VERSION = 13", "SCHEMA_VERSION = 14")
          migration_anchor = '''        CREATE INDEX idx_pedagogy_eval_runs_decision
              ON pedagogy_eval_runs(final_decision, created_at DESC);
          """,
      ),
  )
  '''
          migration_replacement = '''        CREATE INDEX idx_pedagogy_eval_runs_decision
              ON pedagogy_eval_runs(final_decision, created_at DESC);
          """,
      ),
      (
          14,
          """
          ALTER TABLE web_lookup_runs ADD COLUMN stage TEXT NOT NULL DEFAULT 'planned';
          ALTER TABLE web_lookup_runs ADD COLUMN query_plan TEXT NOT NULL DEFAULT '{}';
          ALTER TABLE web_lookup_runs ADD COLUMN attempts TEXT NOT NULL DEFAULT '[]';
          ALTER TABLE web_lookup_runs ADD COLUMN empty_reason TEXT NOT NULL DEFAULT '';
          ALTER TABLE web_lookup_runs ADD COLUMN max_items INTEGER NOT NULL DEFAULT 8;
          ALTER TABLE web_lookup_runs ADD COLUMN active_operation_id TEXT;
          ALTER TABLE web_lookup_runs ADD COLUMN active_operation_started_at TEXT;
          ALTER TABLE web_lookup_runs ADD COLUMN stage_started_at TEXT;

          UPDATE web_lookup_runs
          SET stage = CASE
              WHEN status = 'completed' THEN 'completed'
              WHEN status = 'failed' THEN 'failed'
              WHEN status = 'running' THEN 'searching'
              ELSE 'planned'
          END;

          CREATE INDEX idx_web_lookup_runs_stage_updated
              ON web_lookup_runs(stage, updated_at DESC);
          CREATE INDEX idx_web_lookup_runs_active_operation
              ON web_lookup_runs(active_operation_id);
          """,
      ),
  )
  '''
          replace_once(database, migration_anchor, migration_replacement)

          test_file = "tests/test_web_lookup_run.py"
          replace_once(
              test_file,
              '    gateway = FakeGateway(["empty"] * 8 + ["success"])\n',
              '    gateway = FakeGateway(["empty", "success"])\n',
          )

          types_file = "frontend/src/types.ts"
          replace_once(
              types_file,
              '''export type NewsLookupResponse = {
    run_id: string;
    query_text: string;
    news_items: Array<Record<string, unknown>>;
    source_block: string;
    warnings: string[];
  };
  ''',
              '''export type NewsLookupResponse = {
    run_id: string;
    query_text: string;
    news_items: Array<Record<string, unknown>>;
    source_block: string;
    warnings: string[];
    status?: "pending" | "running" | "completed" | "empty" | "failed";
    stage?: "planned" | "searching" | "completed" | "empty" | "failed";
    empty_reason?: string;
    attempts?: Array<Record<string, unknown>>;
    error?: string;
  };
  ''',
          )
          replace_once(
              types_file,
              '''export type WebLookupRunResponse = {
    id: string;
    query: string;
    status: "running" | "completed" | "failed";
    items: Array<Record<string, unknown>>;
    source_block: string;
    warnings: string[];
    error: string;
    version: number;
    created_at: string;
    updated_at: string;
    completed_at?: string | null;
  };
  ''',
              '''export type WebLookupRunResponse = {
    id: string;
    query: string;
    stage: "planned" | "searching" | "completed" | "empty" | "failed";
    status: "pending" | "running" | "completed" | "empty" | "failed";
    query_plan: Record<string, unknown>;
    attempts: Array<Record<string, unknown>>;
    items: Array<Record<string, unknown>>;
    source_block: string;
    warnings: string[];
    empty_reason: string;
    error: string;
    max_items: number;
    active_operation_id?: string | null;
    active_operation_started_at?: string | null;
    stage_started_at?: string | null;
    version: number;
    created_at: string;
    updated_at: string;
    completed_at?: string | null;
  };
  ''',
          )

          api_file = "frontend/src/api.ts"
          old_api = '''export async function lookupNews(
    query: string,
    maxItems = 8,
    requestOptions: { signal?: AbortSignal } = {}
  ): Promise<NewsLookupResponse> {
    const run = await requestJson<WebLookupRunResponse>("/web-lookup-runs", {
      method: "POST",
      signal: requestOptions.signal,
      body: JSON.stringify({
        query,
        max_items: maxItems
      })
    });
    return webLookupRunToLegacyResponse(run);
  }

  export async function loadWebLookupRun(runId: string): Promise<NewsLookupResponse> {
    const run = await requestJson<WebLookupRunResponse>(
      `/web-lookup-runs/${encodeURIComponent(runId)}`
    );
    return webLookupRunToLegacyResponse(run);
  }

  function webLookupRunToLegacyResponse(run: WebLookupRunResponse): NewsLookupResponse {
    return {
      run_id: run.id,
      query_text: run.query,
      news_items: run.items,
      source_block: run.source_block,
      warnings: run.warnings,
    };
  }
  '''
          new_api = '''export async function createResearchRun(
    query: string,
    maxItems = 8,
    requestOptions: { signal?: AbortSignal } = {}
  ): Promise<NewsLookupResponse> {
    const run = await requestJson<WebLookupRunResponse>("/research-runs", {
      method: "POST",
      signal: requestOptions.signal,
      body: JSON.stringify({ query, max_items: maxItems })
    });
    return webLookupRunToLegacyResponse(run);
  }

  export async function searchResearchRun(
    runId: string,
    requestOptions: { signal?: AbortSignal } = {}
  ): Promise<NewsLookupResponse> {
    const run = await requestJson<WebLookupRunResponse>(
      `/research-runs/${encodeURIComponent(runId)}/search`,
      { method: "POST", signal: requestOptions.signal }
    );
    return webLookupRunToLegacyResponse(run);
  }

  export async function retryResearchRun(
    runId: string,
    requestOptions: { signal?: AbortSignal } = {}
  ): Promise<NewsLookupResponse> {
    const run = await requestJson<WebLookupRunResponse>(
      `/research-runs/${encodeURIComponent(runId)}/retry`,
      { method: "POST", signal: requestOptions.signal }
    );
    return webLookupRunToLegacyResponse(run);
  }

  export async function lookupNews(
    query: string,
    maxItems = 8,
    requestOptions: { signal?: AbortSignal } = {}
  ): Promise<NewsLookupResponse> {
    const created = await createResearchRun(query, maxItems, requestOptions);
    return searchResearchRun(created.run_id, requestOptions);
  }

  export async function loadWebLookupRun(runId: string): Promise<NewsLookupResponse> {
    const run = await requestJson<WebLookupRunResponse>(
      `/research-runs/${encodeURIComponent(runId)}`
    );
    return webLookupRunToLegacyResponse(run);
  }

  function webLookupRunToLegacyResponse(run: WebLookupRunResponse): NewsLookupResponse {
    return {
      run_id: run.id,
      query_text: run.query,
      news_items: run.items,
      source_block: run.source_block,
      warnings: run.warnings,
      status: run.status,
      stage: run.stage,
      empty_reason: run.empty_reason,
      attempts: run.attempts,
      error: run.error,
    };
  }
  '''
          replace_once(api_file, old_api, new_api)

          workspace = "frontend/src/app/WorkspaceView.tsx"
          replace_once(
              workspace,
              '          onLookupNews={webLookupController.lookup}\n          isWechatBusy={groupController.isBusy}\n',
              '          onLookupNews={webLookupController.lookup}\n'
              '          onRetryWebLookup={webLookupController.retry}\n'
              '          canRetryWebLookup={webLookupController.canRetry}\n'
              '          isWechatBusy={groupController.isBusy}\n',
          )

          panel = "frontend/src/features/wechat-workspace/WechatPanel.tsx"
          replace_once(
              panel,
              '  onLookupNews,\n  isWechatBusy,\n',
              '  onLookupNews,\n  onRetryWebLookup,\n  canRetryWebLookup,\n  isWechatBusy,\n',
          )
          replace_once(
              panel,
              '  onLookupNews: () => void;\n  isWechatBusy: boolean;\n',
              '  onLookupNews: () => void;\n'
              '  onRetryWebLookup: () => void;\n'
              '  canRetryWebLookup: boolean;\n'
              '  isWechatBusy: boolean;\n',
          )
          replace_once(
              panel,
              '''      {webLookup ? (
          <div className="news-result lookup-result">
            <label className="toggle-row">
  ''',
              '''      {webLookup ? (
          <div className="news-result lookup-result">
            <div className="memory-preview-meta">
              <strong>研究状态：{webLookup.status ?? "completed"}</strong>
              <span>
                {webLookup.status === "empty"
                  ? webLookup.empty_reason || "当前来源未返回结果"
                  : webLookup.error || `已记录 ${webLookup.attempts?.length ?? 0} 次尝试`}
              </span>
            </div>
            {canRetryWebLookup ? (
              <button
                className="ghost-action compact"
                disabled={isNewsBusy}
                onClick={onRetryWebLookup}
                type="button"
              >
                {isNewsBusy ? <Loader2 className="spin" size={14} /> : null}
                重试本次研究
              </button>
            ) : null}
            <label className="toggle-row">
  ''',
          )

          boundary = Path("frontend/src/features/web-lookup/WebLookupRunBoundary.test.ts")
          boundary.write_text(
              '''import { readFileSync } from "node:fs";
  import { resolve } from "node:path";
  import { describe, expect, it } from "vitest";

  const root = resolve(process.cwd(), "src");

  describe("recoverable web research composition", () => {
    it("creates a durable run before searching and exposes retry", () => {
      const controller = readFileSync(
        resolve(root, "features/web-lookup/webLookupController.ts"),
        "utf8",
      );
      expect(controller).toContain("createResearchRun");
      expect(controller).toContain("searchResearchRun");
      expect(controller).toContain("retryResearchRun");
      expect(controller.indexOf("createResearchRun")).toBeLessThan(
        controller.indexOf("searchResearchRun"),
      );
    });

    it("wires retry state into the visible group research panel", () => {
      const workspace = readFileSync(resolve(root, "app/WorkspaceView.tsx"), "utf8");
      const panel = readFileSync(
        resolve(root, "features/wechat-workspace/WechatPanel.tsx"),
        "utf8",
      );
      expect(workspace).toContain("onRetryWebLookup={webLookupController.retry}");
      expect(workspace).toContain("canRetryWebLookup={webLookupController.canRetry}");
      expect(panel).toContain("重试本次研究");
      expect(panel).toContain("研究状态");
    });
  });
  ''',
              encoding="utf-8",
          )
          PY

      - name: Restore canonical CI before validation
        run: git checkout origin/main -- .github/workflows/ci.yml

      - name: Install dependencies
        timeout-minutes: 8
        run: |
          python -m pip install --disable-pip-version-check --timeout 30 --retries 5 --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt --disable-pip-version-check --timeout 30 --retries 5

      - name: Run pytest
        run: pytest

      - name: Run ruff
        run: ruff check .

      - name: Run package helper
        run: python tools/package_project_helper.py . /dev/null 0

      - name: Run detect-secrets
        run: |
          pip install detect-secrets 2>/dev/null
          detect-secrets scan --disable-plugin KeywordDetector \
            --exclude-files '.*\.(pyc|jpg|png|zip)$' \
            .github README.md docs src tests tools config templates roles changelog assets frontend .env.example \
            > /tmp/study-agent-secrets.json 2>&1
          python - <<'PY'
          import json
          import sys
          with open("/tmp/study-agent-secrets.json", encoding="utf-8") as f:
              report = json.load(f)
          findings = {
              filename: secrets
              for filename, secrets in report.get("results", {}).items()
              if secrets
          }
          if findings:
              json.dump(findings, sys.stdout, indent=2, sort_keys=True)
              print()
              raise SystemExit(1)
          PY

      - name: Run expanded mypy
        continue-on-error: true
        run: timeout 120s mypy --explicit-package-bases src/

      - name: Test and build frontend
        working-directory: frontend
        run: |
          npm ci
          npm test
          npm run build

      - name: Commit validated product patch
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "feat: add recoverable staged research runs"
          git push origin HEAD:feat/p0-research-run
