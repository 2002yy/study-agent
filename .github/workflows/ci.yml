name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run pytest
        run: pytest

      - name: Run ruff
        run: ruff check .

      - name: Run package helper (validate packaging logic)
        run: python tools/package_project_helper.py . /dev/null 0

      - name: Run detect-secrets
        run: |
          if command -v detect-secrets &> /dev/null; then
            detect-secrets scan --disable-plugin KeywordDetector \
              --exclude-files '.*\.(pyc|jpg|png|zip)$' --all-files \
              > .secrets.out 2>&1 || true
            if [ -s .secrets.out ] && grep -q '"is_secret": true' .secrets.out 2>/dev/null; then
              echo "WARNING: potential secrets found (see .secrets.out)"
            fi
          else
            echo "detect-secrets not installed; skipping scan"
          fi

      - name: Run expanded mypy
        continue-on-error: true
        run: timeout 120s mypy --explicit-package-bases src/
