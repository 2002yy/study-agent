name: Diagnose external policy frontend

on:
  pull_request:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/p0-external-data-policy

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Apply frontend patch
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text(encoding="utf-8")
              if old not in text:
                  raise SystemExit(f"anchor not found in {path}: {old[:120]!r}")
              file.write_text(text.replace(old, new, 1), encoding="utf-8")

          sidebar = "frontend/src/layout/Sidebar.tsx"
          replace_once(sidebar, 'import { roleLabel, roleOptions } from "../features/roles/roleCatalog";\n', 'import { roleLabel, roleOptions } from "../features/roles/roleCatalog";\nimport { ExternalDataPolicySettings } from "../features/settings/ExternalDataPolicySettings";\n')
          replace_once(sidebar, '      <section className="side-section">\n        <div className="section-title">\n          <Settings size={15} />\n          单人学习设置\n', '      <ExternalDataPolicySettings\n        runtimeSettings={snapshot.runtimeSettings}\n        disabled={isSending}\n        onSaved={refresh}\n      />\n\n      <section className="side-section">\n        <div className="section-title">\n          <Settings size={15} />\n          单人学习设置\n')

          controller = "frontend/src/features/chat/chatController.ts"
          replace_once(controller, 'type ControllerOptions = {\n', 'const WEB_CONSENT_MARKER = "__STUDY_AGENT_WEB_CONSENT__";\n\ntype ControllerOptions = {\n')
          replace_once(controller, '  useWebLookup: boolean;\n', '  useWebLookup: boolean;\n  webPolicy?: string;\n')
          replace_once(controller, '    const shouldConsumeWebLookup = options.useWebLookup && Boolean(options.webLookupSource);\n', '    const shouldConsumeWebLookup = options.useWebLookup && Boolean(options.webLookupSource);\n    let turnWebContext = shouldConsumeWebLookup ? options.webLookupSource : "";\n    if (\n      !turnWebContext &&\n      options.webPolicy === "ask" &&\n      window.confirm("允许本轮联网搜索吗？搜索词会发送给外部搜索服务。")\n    ) {\n      turnWebContext = WEB_CONSENT_MARKER;\n    }\n')
          replace_once(controller, '          webContext: shouldConsumeWebLookup ? options.webLookupSource : "",\n', '          webContext: turnWebContext,\n')

          composition = "frontend/src/app/useWorkspaceControllers.ts"
          replace_once(composition, '  const chatController = useChatController({\n', '  const runtimeSettings = (options.snapshot.runtimeSettings?.settings ?? {}) as Record<string, unknown>;\n  const webPolicy = String(runtimeSettings.web_policy ?? "auto");\n  const chatController = useChatController({\n')
          replace_once(composition, '    useWebLookup: webLookupController.useInChat,\n', '    useWebLookup: webLookupController.useInChat,\n    webPolicy,\n')

          frontend_types = "frontend/src/types.ts"
          replace_once(frontend_types, '    rag_min_score: number;\n', '    rag_min_score: number;\n    web_policy?: "off" | "ask" | "auto";\n    cloud_context_policy?: "question_only" | "recent_chat" | "allow_local_evidence";\n')
          replace_once(frontend_types, '    retrieval_modes: RagSettings["retrievalMode"][];\n', '    retrieval_modes: RagSettings["retrievalMode"][];\n    web_policies?: string[];\n    cloud_context_policies?: string[];\n')
          PY

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        id: tests
        continue-on-error: true
        working-directory: frontend
        run: npm test > ../frontend-test-output.txt 2>&1

      - name: Run frontend build
        id: build
        continue-on-error: true
        working-directory: frontend
        run: npm run build > ../frontend-build-output.txt 2>&1

      - name: Upload frontend diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: external-policy-frontend
          path: |
            frontend-test-output.txt
            frontend-build-output.txt
          if-no-files-found: error

      - name: Preserve failure status
        if: steps.tests.outcome == 'failure' || steps.build.outcome == 'failure'
        run: exit 1
