name: Diagnose research run frontend

on:
  push:
  pull_request:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Run frontend tests
        id: tests
        continue-on-error: true
        working-directory: frontend
        run: npm test > ../research-run-final-tests.txt 2>&1
      - name: Run frontend build
        id: build
        continue-on-error: true
        working-directory: frontend
        run: npm run build > ../research-run-final-build.txt 2>&1
      - name: Upload frontend diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: research-run-final-frontend
          path: |
            research-run-final-tests.txt
            research-run-final-build.txt
          if-no-files-found: error
      - name: Preserve failure status
        if: steps.tests.outcome == 'failure' || steps.build.outcome == 'failure'
        run: exit 1
