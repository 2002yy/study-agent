name: Diagnostic frontend

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  frontend-diagnostic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Capture frontend tests
        id: tests
        continue-on-error: true
        working-directory: frontend
        run: |
          set +e
          npm test > ../frontend-test-output.txt 2>&1
          code=$?
          echo "$code" > ../frontend-test-exit-code.txt
          exit "$code"
      - name: Capture frontend build
        id: build
        continue-on-error: true
        working-directory: frontend
        run: |
          set +e
          npm run build > ../frontend-build-output.txt 2>&1
          code=$?
          echo "$code" > ../frontend-build-exit-code.txt
          exit "$code"
      - name: Upload frontend diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-diagnostic
          path: |
            frontend-test-output.txt
            frontend-test-exit-code.txt
            frontend-build-output.txt
            frontend-build-exit-code.txt
          if-no-files-found: error
      - name: Fail when frontend checks failed
        if: steps.tests.outcome == 'failure' || steps.build.outcome == 'failure'
        run: exit 1
