rules:
  - name: direct_answer
    priority: 102
    keywords:
      - 一句话总结
      - 概括一下
      - 概 括
      - 直接回答
      - 给结论
      - 列步骤
      - 不要追问
      - 总结一下
      - 直接告诉我
      - 直接给我
      - 给我方案
      - 现在开始改
      - 停止提问
      - 不要继续让我复述
    role: nahida
    mode: 普通
    model: flash
    reason: 要求直给结果/总结/显式切换 → 纳西妲用普通直接回答，不绕弯

  - name: socratic_rediscovery
    priority: 105
    keywords:
      - 别直接告诉我
      - 引导我思考
      - 一步步问我
      - 让我自己推出
      - 用苏格拉底法
      - 带我发现
      - 先听我的判断
      - 不要马上给答案
      - 通过反例引导我
      - 我想自己想明白
      - 先问我
      - 别直接讲
    role: nahida
    mode: 苏格拉底
    model: pro
    reason: 用户明确要求通过引导完成知识再发现

  - name: mechanism_explanation
    priority: 80
    keywords:
      - 为什么
      - 本质
      - 底层
      - 机制
      - 原理
      - 从根上讲
    role: nahida
    mode: 普通
    model: pro
    reason: 用户要求深入解释，但没有明确要求自行推导

  - name: task
    priority: 90
    keywords:
      - 怎么办
      - 下一步
      - 实现
      - 修改
      - 代码
      - bug
      - 报错
      - 测试
      - 方案
      - 部署
      - 配置
    role: keqing
    mode: 项目
    model: pro
    reason: 任务/实现/排错 → 刻晴用项目模式收束

  - name: feynman
    priority: 70
    keywords:
      - 我来讲
      - 你听我解释
      - 检查我理解
      - 我复述
      - 我的理解是
      - 你听听看
      - 我来解释
      - 帮你检查
      - 讲给你听
      - 说给你听
      - 我理解的是
    role: nahida
    mode: 费曼
    model: pro
    reason: 用户尝试复述 → 纳西妲用费曼模式找漏洞

  - name: paper
    priority: 80
    keywords:
      - 论文
      - 摘要
      - 降AI
      - 章节
      - 参考文献
      - 表述
      - 替换
      - 论据
      - 论点
    role: keqing
    mode: 项目
    model: pro
    reason: 论文/审读 → 刻晴按任务意图审视结构和修改步骤

  - name: winddown
    priority: 40
    keywords:
      - 累
      - 复盘
      - 收尾
      - 今天到这
      - 简单总结
      - 陪我理一下
      - 不想学了
      - 休息
    role: firefly
    mode: 普通
    model: flash
    reason: 疲惫/收尾 → 流萤轻陪伴

  - name: beginner
    priority: 50
    keywords:
      - 入门
      - 开始学
      - 有趣点
      - 新手
      - 零基础
    role: march7
    mode: 普通
    model: flash
    reason: 入门/启动 → 三月七用普通模式讲清基础

  - name: concept_map
    priority: 60
    keywords:
      - 概念地图
      - 关系图
      - 知识结构
      - 梳理概念
      - 概念关系
      - 区别是什么
      - 对比一下
      - 概念梳理
      - 理清关系
      - 概念的区别
      - 这几个概念
    role: nahida
    mode: 普通
    model: pro
    reason: 概念梳理/结构整理 → 纳西妲用普通讲解梳理关系

default:
  role: nahida
  mode: 普通
  model: flash
  reason: 无匹配规则，使用默认
